name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.4.0-beta.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  bundle:
    name: ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin
            arch: arm64
            runner: macos-14
          - platform: darwin
            arch: x64
            runner: macos-13
          - platform: linux
            arch: x64
            runner: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Confirm tag matches package version
        run: node -e "const version = require('./package.json').version; if ('v' + version !== '${{ inputs.tag }}') process.exit(1)"

      - name: Install and build
        run: |
          npm ci
          npm run build
          npm run typecheck

      - name: Build release archive
        run: node scripts/release-bundle.mjs ${{ matrix.platform }} ${{ matrix.arch }}

      - name: Smoke test release archive
        run: |
          archive=$(find release -name '*.tar.gz' -print -quit)
          target=$(tar -tzf "$archive" | head -1 | cut -d/ -f1)
          tar -xzf "$archive" -C release
          "release/$target/relay" --help

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/*.tar.gz
          if-no-files-found: error

  publish:
    needs: bundle
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: relay-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: release
        run: sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ inputs.tag }}" release/*.tar.gz release/SHA256SUMS.txt --prerelease --title "Relay ${{ inputs.tag }}" --generate-notes
